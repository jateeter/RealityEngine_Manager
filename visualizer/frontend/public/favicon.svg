<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#grad1)"/>

  <!-- Central node (reality vector) -->
  <circle cx="16" cy="16" r="4" fill="#fff" opacity="0.9"/>

  <!-- Surrounding nodes forming a network pattern -->
  <circle cx="8" cy="8" r="2.5" fill="#fff" opacity="0.7"/>
  <circle cx="24" cy="8" r="2.5" fill="#fff" opacity="0.7"/>
  <circle cx="8" cy="24" r="2.5" fill="#fff" opacity="0.7"/>
  <circle cx="24" cy="24" r="2.5" fill="#fff" opacity="0.7"/>

  <!-- Connecting lines (edges) -->
  <line x1="16" y1="16" x2="8" y2="8" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <line x1="16" y1="16" x2="24" y2="8" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <line x1="16" y1="16" x2="8" y2="24" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <line x1="16" y1="16" x2="24" y2="24" stroke="#fff" stroke-width="1.5" opacity="0.5"/>

  <!-- Subtle outer ring -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
</svg>
