openapi: 3.1.0
info:
  title: RealityEngine CPP — Perception Engine API
  version: 1.1.0-cpp
  description: 'OpenAPI contract for the C++ (Boost.Beast / Asio) Perception Engine runtime.


    Default native port: **5300**.

    Additional CPP instances add +100 per pair (cpp-2: 5400, cpp-3: 5500).

    In Docker/CI deployments the TLS proxy exposes the PE at `https://localhost:3004`.


    Wire-compatible with the LSP (Common Lisp) and Scala runtimes.

    '
  x-generated-from: /Users/johnt/workspace/GitHub/RealityEngine_CPP/SURFACE_SPEC.md
servers:
- url: http://localhost:5300
  description: Local CPP Perception Engine (native, instance cpp-1)
- url: https://localhost:3004
  description: Docker TLS proxy (CI deployment)
