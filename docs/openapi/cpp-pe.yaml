components:
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Object:
      type: object
      additionalProperties: true
    Success:
      type: object
      properties:
        success:
          type: boolean
    Error:
      type: object
      properties:
        error:
          type: string
    Health:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: number
        version:
          type: string
    Source:
      type: object
      properties:
        id:
          type: string
        machineId:
          type: string
        sensorId:
          type: string
        enabled:
          type: boolean
        intervalMs:
          type: integer
    HealthKitIngestRequest:
      type: object
      description: Single sample (flat) or batch.
      properties:
        type:
          type: string
          example: HKQuantityTypeIdentifierHeartRate
        value:
          type: number
        sourceName:
          type: string
        bridgeId:
          type: string
        samples:
          type: array
          items:
            type: object
            additionalProperties: true
    HealthKitIngestResponse:
      type: object
      properties:
        success:
          type: boolean
        bridgeId:
          type: string
        resolved:
          type: array
          items:
            type: object
            additionalProperties: true
        unmapped:
          type: array
          items:
            type: object
            additionalProperties: true
    CareKitIngestRequest:
      type: object
      properties:
        bridgeId:
          type: string
        sampleType:
          type: string
        sourceMappingId:
          type: string
        values:
          type: array
          items:
            type: number
    CareKitIngestResponse:
      type: object
      properties:
        success:
          type: boolean
        bridgeId:
          type: string
        results:
          type: array
          items:
            type: object
            additionalProperties: true
    MqttBridgeStatus:
      type: object
      properties:
        enabled:
          type: boolean
        connected:
          type: boolean
        brokerUrl:
          type: string
        clientId:
          type: string
        mappingCount:
          type: integer
    MqttMappingRule:
      type: object
      required:
      - topic
      - sensorId
      properties:
        topic:
          type: string
        sensorId:
          type: string
        field:
          type: string
        scale:
          type: number
        offset:
          type: number
    MqttMappingsResponse:
      type: object
      properties:
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/MqttMappingRule'
    DispatchRecord:
      type: object
      properties:
        id:
          type: string
        machineId:
          type: string
        sequenceId:
          type: string
        timestamp:
          type: number
        status:
          type: string
