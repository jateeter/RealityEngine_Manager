openapi: 3.1.0
info:
  title: RealityEngine CPP — Reality Engine API
  version: 1.1.0-cpp
  description: 'OpenAPI contract for the C++ (Boost.Beast / Asio) Reality Engine runtime.


    Default native port: **5301** (PE on 5301 − 1 = 5300).

    Additional CPP instances add +100 per pair (cpp-2: 5401/5400, cpp-3: 5501/5500).

    In Docker/CI deployments the TLS proxy exposes the RE at `https://localhost:5001`.


    Wire-compatible with the LSP (Common Lisp) and Scala runtimes.

    Every metric line carries `runtime="cpp"`.

    '
  x-generated-from: /Users/johnt/workspace/GitHub/RealityEngine_CPP/SURFACE_SPEC.md
servers:
- url: http://localhost:5301
  description: Local CPP Reality Engine (native, instance cpp-1)
- url: https://localhost:5001
  description: Docker TLS proxy (CI deployment)
