components:
  parameters:
    MachineId:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Object:
      type: object
      additionalProperties: true
    Vector:
      type: array
      items:
        type: number
        format: double
    Success:
      type: object
      properties:
        success:
          type: boolean
    Error:
      type: object
      properties:
        error:
          type: string
    Health:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: number
        version:
          type: string
    RealityConfig:
      type: object
      properties:
        vectorDimension:
          type: integer
          example: 7680
        matchThreshold:
          type: number
          example: 0.5
        qdrantUrl:
          type: string
        collectionName:
          type: string
          example: reality-vectors
    RuntimeOptions:
      type: object
      properties:
        historyLimit:
          type: integer
          example: 256
        includeMachineResults:
          type: boolean
        includePerceptualSpace:
          type: boolean
    RuntimeOptionsPatch:
      type: object
      properties:
        historyLimit:
          type: integer
          minimum: 0
        includeMachineResults:
          type: boolean
        includePerceptualSpace:
          type: boolean
    Region:
      type: object
      required:
      - offset
      - length
      properties:
        offset:
          type: integer
        length:
          type: integer
    Machine:
      type: object
      additionalProperties: true
      description: RealityEngine machine JSON.
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        perceptualMapping:
          type: object
          additionalProperties: true
        sequences:
          type: array
          items:
            type: object
            additionalProperties: true
    MachineMutationResponse:
      type: object
      properties:
        success:
          type: boolean
        machine:
          $ref: '#/components/schemas/Machine'
        message:
          type: string
    MachineTransitionResult:
      type: object
      additionalProperties: true
      properties:
        inputVector:
          $ref: '#/components/schemas/Vector'
        timestamp:
          type: number
        machineOutput:
          type: array
          items:
            type: number
            format: double
          nullable: true
        sequenceResults:
          type: array
          items:
            type: object
            additionalProperties: true
    SimulationStep:
      type: object
      properties:
        stepNumber:
          type: integer
        timestamp:
          type: number
        perceptualSpace:
          $ref: '#/components/schemas/Vector'
        machineResults:
          type: object
          additionalProperties: true
    SimulationConfigureChunk:
      type: object
      properties:
        reset:
          type: boolean
        vectors:
          type: array
          items:
            $ref: '#/components/schemas/Vector'
        config:
          type: object
          additionalProperties: true
    PerceiveRequest:
      type: object
      required:
      - vector
      properties:
        vector:
          $ref: '#/components/schemas/Vector'
        compact:
          type: boolean
        includeMachineResults:
          type: boolean
        includePerceptualSpace:
          type: boolean
    PagingDecision:
      type: object
      properties:
        machineId:
          type: string
        sequenceId:
          type: string
        ragStatusCode:
          type: string
          enum:
          - GREEN
          - AMBER
          - RED
        ownerTeam:
          type: string
        runbook:
          type: string
        source:
          type: string
          enum:
          - rule-with-override
          - rule-only
          - machine-fallback
